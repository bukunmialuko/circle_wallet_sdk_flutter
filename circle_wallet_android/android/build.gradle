plugins {
    id "com.android.library"
    id "kotlin-android"
}

group 'com.example.verygoodcore'
version '1.0-SNAPSHOT'

def circlefinProps = new Properties()
def circlefinPropsFile = rootProject.file('circlefin-maven.properties')
if (circlefinPropsFile.exists()) {
    circlefinPropsFile.withReader('UTF-8') { reader -> circlefinProps.load(reader) }
}

allprojects {
    repositories {
        google()
        mavenCentral()

        def mavenUrl = System.getenv('PWSDK_MAVEN_URL') ?: circlefinProps.getProperty('PWSDK_MAVEN_URL')
        if (!mavenUrl?.trim()) {
            throw new GradleException(
                "PWSDK_MAVEN_URL not set. Provide the PWSDK_MAVEN_URL environment variable " +
                "or create circlefin-maven.properties next to the root build.gradle."
            )
        }
        maven {
            url mavenUrl
            credentials {
                username System.getenv('PWSDK_MAVEN_USERNAME') ?: circlefinProps.getProperty('PWSDK_MAVEN_USERNAME') ?: ''
                password System.getenv('PWSDK_MAVEN_PASSWORD') ?: circlefinProps.getProperty('PWSDK_MAVEN_PASSWORD') ?: ''
            }
        }
    }
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

android {
    if (project.android.hasProperty("namespace")) {
        namespace 'com.example.verygoodcore'
    }

    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
        test.java.srcDirs += 'src/test/kotlin'
    }

    defaultConfig {
        minSdkVersion 19
    }

    testOptions {
        unitTests.all {
            useJUnitPlatform()

            testLogging {
               events "passed", "skipped", "failed", "standardOut", "standardError"
               outputs.upToDateWhen {false}
               showStandardStreams = true
            }
        }
    }
}

dependencies {
    compileOnly files("$flutterRoot/bin/cache/artifacts/engine/android-arm/flutter.jar")

    implementation "circle.programmablewallet:sdk:1.0.1189"

    testImplementation 'org.jetbrains.kotlin:kotlin-test'
    testImplementation 'org.mockito:mockito-core:5.0.0'
}