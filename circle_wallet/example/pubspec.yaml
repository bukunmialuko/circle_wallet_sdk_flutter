name: circle_wallet_example
description: Demonstrates how to use the circle_wallet plugin.
version: 0.1.0+1
publish_to: none

environment:
  sdk: ^3.10.0

dependencies:
  circle_wallet:
    # When depending on this package from a real application you should use:
    #   circle_wallet: ^x.y.z
    # See https://dart.dev/tools/pub/dependencies#version-constraints
    # The example app is bundled with the plugin so we use a path dependency on
    # the parent directory to use the current plugin's version.
    path: ../
  dio: ^5.9.1
  flutter:
    sdk: flutter
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  google_sign_in: 6.3.0

dependency_overrides:
  google_sign_in_ios: 5.8.1


dev_dependencies:
  flutter_driver:
    sdk: flutter
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  very_good_analysis: ^10.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
  fonts:
    - family: OpenRunde
      fonts:
        - asset: assets/fonts/OpenRunde-Regular.otf
        - asset: assets/fonts/OpenRunde-Medium.otf
          weight: 500
        - asset: assets/fonts/OpenRunde-SemiBold.otf
          weight: 600
        - asset: assets/fonts/OpenRunde-Bold.otf
          weight: 700
